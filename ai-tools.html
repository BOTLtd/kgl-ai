const container = document.getElementById("cardContainer");

function displayCards(data){
  container.innerHTML="";
  data.forEach(card=>{
    container.innerHTML+=`
      <div class="card">
        <img src="${card.image}">
        <div class="card-content">
          <h3>${card.title}</h3>
          <p><b>Problem:</b> ${card.problem}</p>
          <p><b>Solution:</b> ${card.solution}</p>
          <p><b>Impact:</b> ${card.impact}</p>
          <button onclick="alert('Coming soon')">Explore</button>
        </div>
      </div>`;
  });
}

function filterCards(){
  let search=document.getElementById("searchInput").value.toLowerCase();
  let category=document.getElementById("categoryFilter").value;

  let filtered=cards.filter(c=>{
    return (c.title.toLowerCase().includes(search)) &&
           (category==="all"||c.category===category);
  });

  displayCards(filtered);
}

document.getElementById("searchInput").addEventListener("input",filterCards);
document.getElementById("categoryFilter").addEventListener("change",filterCards);

displayCards(cards);
