<div id="jobs"></div>

<script type="module">
import { supabase } from "./js/supabase.js";

const jobsDiv = document.getElementById("jobs");

const { data: jobs } = await supabase.from("jobs").select("*");

jobs.forEach(job => {
  jobsDiv.innerHTML += `
    <div class="card">
      <h3>${job.title}</h3>
      <p>${job.description}</p>
      <a href="apply.html?job=${job.id}">Apply</a>
    </div>
  `;
});
</script>
