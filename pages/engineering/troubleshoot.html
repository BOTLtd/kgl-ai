<!DOCTYPE html>
<html>
<head>
  <title>KGL AI Diagnostics</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6">

<h1 class="text-3xl mb-6">🚲 KGL AI Troupleshoot Pro</h1>

<div id="symptoms" class="grid grid-cols-2 gap-4"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://vbuffgasrckvlxoilsec.supabase.co",
  "sb_publishable_RfN-k0VZHztLhO-BFwtwtA_sUwv5rWR"
);

async function loadSymptoms(){
  const { data } = await supabase.from("symptoms").select("*");

  const container = document.getElementById("symptoms");

  data.forEach(s => {
    const btn = document.createElement("button");
    btn.className = "p-4 bg-green-600 rounded";
    btn.innerText = s.name;

    btn.onclick = () => {
      window.location.href = `diagnose.html?symptom=${s.id}`;
    };

    container.appendChild(btn);
  });
}

loadSymptoms();
</script>

</body>
</html>
